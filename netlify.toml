# Netlify configuration for Basecamp Getaways
# The site is plain static HTML/CSS/JS — no build step required.
# Everything that gets published lives in the /site folder.

[build]
  publish = "site"
  command = ""

# Nice-to-have security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
