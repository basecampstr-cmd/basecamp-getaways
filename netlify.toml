# Netlify configuration for Basecamp Getaways
# Static HTML/CSS/JS — no build step. Published folder is /site.

[build]
  publish = "site"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS/JS are unversioned filenames, so always revalidate to pick up updates fast.
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Photos rarely change — cache them for a day for speed.
[[headers]]
  for = "/assets/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
